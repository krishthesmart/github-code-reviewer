name: Groq AI Code Reviewer
description: Autonomous PR reviewer using Groq AI — Security, Bugs, Performance, Maintainability, Best Practices with auto-fix
author: krishthesmart

inputs:
  groq_api_key:
    description: Your Groq API key (get one free at console.groq.com)
    required: true
  github_token:
    description: GitHub token for posting reviews (use secrets.GITHUB_TOKEN)
    required: true
  mode:
    description: "review (default) or fix"
    required: false
    default: review
  auto_fix:
    description: "Automatically create a fix PR when issues are found (true/false)"
    required: false
    default: "false"

branding:
  icon: eye
  color: purple

runs:
  using: node20
  main: dist/index.js
